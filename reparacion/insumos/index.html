<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Accesorios diamantados, ruedas de bujardado y puntas para martillo para reparación de hormigón.">
<title>Insumos — Reparación — NewConcret</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;600;700;900&family=Barlow:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="icon" type="image/x-icon" href="../../logos/Favicon.ico">
<link rel="stylesheet" href="../../assets/css/estilo.css?v=40">
<link rel="stylesheet" href="../../assets/css/nav.css?v=1.3">
<style>

  :root{--r:#C1121F;--bk:#0A0A0A;--dk:#111111;--cb:#161616;--st:#272727;--mi:#555;--as:#888;--lt:#CACAC8;--wh:#F4F4F2;--fm:'JetBrains Mono',monospace;--fd:'Barlow Condensed',sans-serif;--fb:'Barlow',sans-serif;--ex:cubic-bezier(0.16,1,0.3,1);}
  .nav-home{display:flex!important;}
  .grid-wrap {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1.5px;
    background: var(--nc-steel);
  }
  @media (max-width: 1200px) { .grid-wrap { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 900px) { .grid-wrap { grid-template-columns: 1fr !important; gap: 1px; } }

  /* ── PRODUCT CARD ── */
  .pcard {
    background: var(--nc-dark);
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
    transition: background 0.4s var(--ex);
    cursor: pointer;
  }
  .pcard:hover { background: var(--nc-carbon); }

  .pcard-img-wrap {
    width: 100%;
    aspect-ratio: 1/1;
    position: relative;
    background: var(--nc-black);
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }
  .pcard-img {
    max-width: 90%;
    max-height: 90%;
    object-fit: contain;
    transition: transform 0.8s var(--ex);
    z-index: 2;
  }
  .pcard:hover .pcard-img { transform: scale(1.08) translateY(-5px); }

  .pcard-img-ov {
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at center, rgba(193, 18, 31, 0.05) 0%, transparent 70%);
    opacity: 0;
    transition: opacity 0.6s var(--ex);
    z-index: 1;
  }
  .pcard:hover .pcard-img-ov { opacity: 1; }

  .pcard-badge {
    position: absolute;
    top: 1.5rem;
    left: 1.5rem;
    background: rgba(10, 10, 10, 0.6);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    padding: 0.4rem 0.8rem;
    font-family: var(--fm);
    font-size: 0.6rem;
    color: var(--r);
    text-transform: uppercase;
    letter-spacing: 0.15em;
    border: 1px solid rgba(193, 18, 31, 0.3);
    z-index: 3;
  }

  .pcard-sku {
    position: absolute;
    bottom: 1rem;
    right: 1.5rem;
    font-family: var(--fm);
    font-size: 0.65rem;
    color: var(--mi);
    opacity: 0.5;
    z-index: 3;
    text-transform: uppercase;
  }

  .pcard-body {
    padding: 2rem;
    flex: 1;
    display: flex;
    flex-direction: column;
    border-top: 1px solid var(--nc-steel);
  }
  .pcard-cat { font-family: var(--fm); font-size: .6rem; color: var(--r); text-transform: uppercase; margin-bottom: .6rem; letter-spacing: 0.15em; }
  .pcard-name { font-family: var(--fd); font-weight: 800; font-size: 1.5rem; color: var(--wh); text-transform: uppercase; line-height: 1.1; margin-bottom: .8rem; }
  .pcard-desc { font-size: .88rem; color: var(--as); line-height: 1.6; margin-bottom: 2rem; display: -webkit-box; -webkit-line-clamp: 2; line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; text-align: left; }
  
  .pcard-features { display: flex; flex-direction: column; border: 1px solid var(--nc-steel); margin-bottom: 1.5rem; }
  .pcard-feat { display: flex; justify-content: space-between; align-items: center; padding: .7rem 1rem; border-bottom: 1px solid var(--nc-steel); transition: background .2s; }
  .pcard-feat:last-child { border-bottom: none; }
  .pcard-feat:hover { background: rgba(255,255,255,0.03); }
  .pcard-feat-label { font-family: var(--fm); font-size: .58rem; color: var(--mi); text-transform: uppercase; letter-spacing: 0.05em; }
  .pcard-feat-val { font-family: var(--fd); font-weight: 600; font-size: .9rem; color: var(--lt); }
  
  .pcard-actions { margin-top: auto; display: flex; gap: 1px; background: var(--nc-steel); border: 1px solid var(--nc-steel); }
  .btn-ver, .btn-ft {
    flex: 1;
    height: 50px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.6rem;
    font-family: var(--fd);
    font-size: 0.75rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    transition: all 0.3s var(--ex);
    cursor: pointer;
    border: none;
    text-decoration: none;
  }
  .btn-ver { background: var(--r); color: #fff; }
  .btn-ver:hover { background: var(--rh); gap: 0.8rem; }
  .btn-ft { background: var(--dk); color: var(--as); }
  .btn-ft:hover { background: var(--cb); color: var(--wh); }

  .modal-bg{position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,.85);backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s;}
  .modal-bg.open{opacity:1;pointer-events:all;}
  .modal{background:var(--dk);border:1px solid var(--st);width:100%;max-width:900px;position:relative;}
  .modal-close{position:absolute;top:1.5rem;right:1.5rem;z-index:10;background:none;border:none;color:var(--as);cursor:none;}
  .modal-close:hover{color:var(--wh);}
  .modal-grid{display:grid;grid-template-columns:1.2fr 1fr;}
  .modal-img{width:100%;height:100%;object-fit:contain;background:#000;padding:2rem;}
  .modal-body{padding:3rem;}
  .reveal{opacity:0;transform:translateY(20px);transition:all .7s var(--ex);}
  .reveal.in{opacity:1;transform:none;}
  body{cursor:none;}

  /* ── PAGE HEADER ── */
  .page-header {
    position: relative;
    margin-top: 68px !important;
    display: flex;
    align-items: center;
    padding: 4rem;
    min-height: 420px;
    overflow: hidden;
    background-size: cover;
    background-position: center;
    background-image: 
      linear-gradient(to right, rgba(10,10,10,.98) 0%, rgba(10,10,10,.7) 50%, rgba(10,10,10,.3) 100%),
      linear-gradient(to top, rgba(10,10,10,.95) 0%, transparent 60%),
      url('../../assets/img/hero/reparacion-insumos.jpg');
  }
  .ph-inner { position: relative; z-index: 2; width: 100%; max-width: 1400px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; gap: 2rem; }
  .ph-count { position: absolute; bottom: 1rem; right: 4rem; text-align: right; border-left: 1px solid var(--st); padding-left: 2rem; z-index: 3; }
  .ph-count b { display: block; font-size: 2.2rem; color: var(--wh); margin-bottom: 0.3rem; font-family: var(--fd, 'Barlow Condensed', sans-serif); font-weight: 800; }
  
  .ph-eyebrow { display: inline-flex; align-items: center; gap: .65rem; margin-bottom: 1.4rem; }
  .ph-eyebrow-line { width: 32px; height: 1px; background: var(--r); }
  .ph-eyebrow-tx { font-family: var(--fm); font-size: .64rem; letter-spacing: .2em; text-transform: uppercase; color: var(--r); }
  .ph-title { font-family: var(--fd); font-weight: 900; font-size: clamp(2.5rem, 5vw, 4.5rem); color: var(--wh); text-transform: uppercase; line-height: 0.9; margin-bottom: 1.5rem; letter-spacing: -0.02em; }
  .ph-desc { font-size: 1.1rem; color: var(--as); max-width: 600px; line-height: 1.5; }

  @media (max-width: 900px) {
    .page-header { 
      margin-top: 66px !important; 
      min-height: 65vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      padding: 1.5rem !important;
      background-image: 
        linear-gradient(to right, rgba(10,10,10,0.98) 0%, rgba(10,10,10,0.8) 30%, rgba(10,10,10,0.5) 60%, rgba(10,10,10,0.2) 100%),
        linear-gradient(to top, rgba(10,10,10,0.95) 0%, transparent 60%),
        url('../../assets/img/hero/reparacion-insumos.jpg') !important;
    }
    .ph-inner { flex-direction: column; align-items: flex-start; gap: 1rem; width: 100%; height: 100%; justify-content: center; }
    .ph-title { font-size: 3.8rem !important; line-height: 0.95; }
    .ph-count { position: absolute; bottom: 1.5rem; left: 1.5rem; right: 1.5rem; text-align: left !important; border-left: none !important; border-top: 1px solid var(--st); padding-top: 1.2rem; margin-top: 0; width: auto; }
    .ph-count b { display: inline; font-size: 1.4rem; }
  }
</style>
</head>
<body>
<div id="cur"></div>
<div id="ring"></div>
<div id="nav-placeholder"></div>

<!-- PAGE HEADER -->
<div class="page-header">
    <div class="ph-inner">
    <div>
      <div class="ph-eyebrow">
        <span class="ph-eyebrow-line"></span>
        <span class="ph-eyebrow-tx">Insumos de Reparación / NewConcret</span>
      </div>
      <h1 class="ph-title">Insumos<br>diamantados</h1>
      <p class="ph-desc">Accesorios para amoladora, ruedas de bujardado y puntas para martillo en trabajos de reparación.</p>
    </div>
    <div class="ph-count">
      <b id="total-count">0</b>
      productos disponibles
    </div>
  </div>
</div>

<!-- FILTER BAR -->
<div class="filter-bar">
  <span class="filter-label">Filtrar:</span>
  <div class="filter-pills"><button class="pill active" data-filter="all">Todos</button><button class="pill" data-filter="accesorios-amoladora">Accesorios amoladora</button><button class="pill" data-filter="bujardado">Bujardado</button><button class="pill" data-filter="puntas-martillo">Puntas martillo</button></div>
  <div class="filter-right">
    <select class="sort-select" id="sortSelect">
      <option value="default">Ordenar: Destacados</option>
      <option value="az">Nombre A–Z</option>
      <option value="za">Nombre Z–A</option>
    </select>
    <div class="view-toggle">
      <button class="view-btn active" id="btnGrid" title="Vista grilla">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="1" y="1" width="5" height="5" stroke="currentColor" stroke-width="1.2"/><rect x="8" y="1" width="5" height="5" stroke="currentColor" stroke-width="1.2"/><rect x="1" y="8" width="5" height="5" stroke="currentColor" stroke-width="1.2"/><rect x="8" y="8" width="5" height="5" stroke="currentColor" stroke-width="1.2"/></svg>
      </button>
      <button class="view-btn" id="btnList" title="Vista lista">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M1 3h12M1 7h12M1 11h12" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
      </button>
    </div>
  </div>
</div>

<!-- PRODUCTS -->
<section class="products-section">
  <div class="prod-count-bar"><span class="prod-count-tx">Mostrando <b id="showing-count">0</b> productos</span></div>
  <div class="grid-wrap" id="productGrid"></div>
</section>


<div class="modal-bg" id="modalBg">
  <div class="modal" id="modal">
    <button class="modal-close" id="modalClose">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M1 1l12 12M13 1L1 13" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
    </button>
    <div class="modal-grid">
      <img id="modalImg" src="" alt="" class="modal-img">
      <div class="modal-body">
        <div class="modal-cat"  id="modalCat"></div>
        <div class="modal-name" id="modalName"></div>
        <div class="modal-desc" id="modalDesc"></div>
        <div class="modal-feats-title">Características técnicas</div>
        <div class="modal-feats" id="modalFeats"></div>
        <div class="modal-actions">
          <a href="#" class="btn-ver" style="flex:1;" id="modalConsultar">
            Consultar disponibilidad
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 7h10M7 3l4 4-4 4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
          </a>
          <a href="#" class="btn-ft" id="modalFicha" download>
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1v8M4 6l3 3 3-3M2 11h10" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
            Ficha técnica
          </a>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="footer-placeholder"></div>
<script src="../../assets/js/layout.js?v=3.0"></script>
<script src="../../assets/data/productos.js?v=3.0"></script>
<script>
const PAGE_SECCION      = 'reparacion';
const PAGE_CATEGORIA    = 'insumos';
const PAGE_SUBCATEGORIA = null;
const ROOT              = '../../';

const ALL_PRODUCTS = typeof productos !== 'undefined' ? productos : [];
let activeFilter = 'all';
let activeSort   = 'default';
let isListView   = false;

function matchProduct(p, seccion, categoria, subcategoria) {
  if (p.rutas && p.rutas.length > 0) {
    return p.rutas.some(function(r) {
      var s  = r['sección']     || r['seccion']     || '';
      var c  = r['categoría']   || r['categoria']   || '';
      var sc = r['subcategoría']|| r['subcategoria']|| '';
      if (s !== seccion) return false;
      if (categoria   && c  !== categoria)   return false;
      if (subcategoria && sc !== subcategoria) return false;
      return true;
    });
  }
  var inSec = Array.isArray(p.secciones) && p.secciones.indexOf(seccion) !== -1;
  if (!inSec) return false;
  if (categoria   && p.categoria   !== categoria)   return false;
  if (subcategoria && p.subcategoria !== subcategoria) return false;
  return true;
}

var arrowSVG = '<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 7h10M7 3l4 4-4 4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>';
var downSVG  = '<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1v8M4 6l3 3 3-3M2 11h10" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>';

function renderCard(p, delay) {
  var imgSrc = p.imagen.startsWith('http') ? p.imagen : ROOT + p.imagen.replace(/^\//, '');
  var badge  = p.badge ? '<div class="pcard-badge-new">' + p.badge + '</div>' : '';
  var catLabel = (p.cat_label || 'Categoría').charAt(0).toUpperCase() + (p.cat_label || 'Categoría').slice(1).replace(/-/g, ' ');

  var feats = (p.specs || []).slice(0, 3).map(function(f) {
    return `
    <div class="pcard-feat">
      <span class="pcard-feat-label">${f.clave}</span>
      <span class="pcard-feat-val">${f.valor}</span>
    </div>`;
  }).join('');

  var shop = p.tiendaUrl;
  var pdf  = p.pdfUrl;

  return `
  <div class="pcard reveal in d${delay}" data-id="${p.id}" onclick="openModal('${p.id}')">
    <div class="pcard-img-wrap">
      <img class="pcard-img" src="${imgSrc}" alt="${p.nombre}" loading="lazy">
      <div class="pcard-img-ov"></div>
      <div class="pcard-badge">${catLabel}</div>
      ${badge}
      <div class="pcard-sku">${p.sku}</div>
    </div>
    <div class="pcard-body">
      <div class="pcard-cat">${catLabel}</div>
      <div class="pcard-name">${p.nombre}</div>
      <div class="pcard-desc">${p.descripcion}</div>
      <div class="pcard-features">${feats}</div>
      <div class="pcard-actions">
        <button class="btn-ver">
          Ver detalles ${arrowSVG}
        </button>
        ${shop 
          ? `<a href="${shop}" target="_blank" rel="noopener" class="btn-ft" onclick="event.stopPropagation()">Tienda</a>`
          : (pdf 
              ? `<a href="${pdf}" target="_blank" rel="noopener" class="btn-ft" onclick="event.stopPropagation()">Ficha</a>`
              : `<a href="https://wa.me/5492342464082" target="_blank" rel="noopener" class="btn-ft" onclick="event.stopPropagation()">Consultar</a>`
            )
        }
      </div>
    </div>
  </div>`;
}

function getFiltered() {
  var sub = PAGE_SUBCATEGORIA || ((activeFilter === 'all') ? null : activeFilter);
  return ALL_PRODUCTS.filter(function(p) {
    return matchProduct(p, PAGE_SECCION, PAGE_CATEGORIA, sub);
  }).sort(function(a, b) {
    if (activeSort === 'az') return a.nombre.localeCompare(b.nombre);
    if (activeSort === 'za') return b.nombre.localeCompare(a.nombre);
    return 0;
  });
}

function render() {
  var grid = document.getElementById('productGrid');
  var list = getFiltered();
  var delays = [1,2,3,1,2,3,1,2,3];
  document.getElementById('showing-count').textContent = list.length;
  document.getElementById('total-count').textContent   = list.length;
  grid.classList.toggle('list-view', isListView);
  if (!list.length) {
    grid.innerHTML = '<div class="empty-state"><h3>Sin resultados</h3><p>No hay productos en esta categoría.</p></div>';
    return;
  }
  grid.innerHTML = list.map(function(p, i) { return renderCard(p, delays[i % delays.length]); }).join('');
  requestAnimationFrame(function() {
    document.querySelectorAll('.reveal').forEach(function(el) { obsReveal.observe(el); });
  });
}

document.querySelectorAll('.pill').forEach(function(btn) {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.pill').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    render();
  });
});
document.getElementById('sortSelect').addEventListener('change', function(e) { activeSort = e.target.value; render(); });
document.getElementById('btnGrid').addEventListener('click', function() { isListView = false; document.getElementById('btnGrid').classList.add('active'); document.getElementById('btnList').classList.remove('active'); render(); });
document.getElementById('btnList').addEventListener('click', function() { isListView = true; document.getElementById('btnList').classList.add('active'); document.getElementById('btnGrid').classList.remove('active'); render(); });

var modalBg = document.getElementById('modalBg');
function openModal(id) {
  var p = ALL_PRODUCTS.find(function(x) { return x.id === id; });
  if (!p) return;
  var imgSrc = p.imagen.startsWith('http') ? p.imagen : ROOT + p.imagen.replace(/^\//, '');
  document.getElementById('modalImg').src              = imgSrc;
  document.getElementById('modalImg').alt              = p.nombre;
  document.getElementById('modalCat').textContent      = (p.cat_label||'Categoría') + ' · ' + p.sku;
  document.getElementById('modalName').textContent     = p.nombre;
  document.getElementById('modalDesc').textContent     = p.descripcion;
  document.getElementById('modalFicha').href           = p.pdfUrl || '#';
  document.getElementById('modalFicha').style.display  = p.pdfUrl ? 'inline-flex' : 'none';
  document.getElementById('modalFeats').innerHTML = (p.specs||[]).map(function(f) {
    return '<div class="modal-feat"><div class="modal-feat-ic">' + (f.icono||'◉') + '</div><div><span class="modal-feat-label">' + f.clave + '</span><span class="modal-feat-val">' + f.valor + '</span></div></div>';
  }).join('');
  modalBg.classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeModal() { modalBg.classList.remove('open'); document.body.style.overflow = ''; }
document.getElementById('modalClose').addEventListener('click', closeModal);
modalBg.addEventListener('click', function(e) { if (e.target === modalBg) closeModal(); });

var cur = document.getElementById('cur'), ring = document.getElementById('ring');
document.addEventListener('mousemove', function(e) { cur.style.left = e.clientX+'px'; cur.style.top = e.clientY+'px'; ring.style.left = e.clientX+'px'; ring.style.top = e.clientY+'px'; });
document.addEventListener('mousedown', function() { document.body.classList.add('cur-grow'); });
document.addEventListener('mouseup',   function() { document.body.classList.remove('cur-grow'); });

var obsReveal = new IntersectionObserver(function(entries) {
  entries.forEach(function(en) { if (en.isIntersecting) en.target.classList.add('in'); });
}, { threshold: 0.1 });

render();

</script>
</body>
</html>
