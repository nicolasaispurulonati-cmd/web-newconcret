<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mortero Cementicio | Materiales Pulido | NewConcret</title>
<meta name="description" content="Mortero cementicio para reparación y bacheo en pisos de hormigón antes de pulir.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;600;700;900&family=Barlow:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="icon" type="image/x-icon" href="../../../logos/Favicon.ico">
<link rel="stylesheet" href="../../../assets/css/estilo.css?v=40">
<link rel="stylesheet" href="../../../assets/css/nav.css?v=1.3">
<style>
  :root {
    --r:  #C1121F;
    --rh: #E5161E;
    --bk: #0A0A0A;
    --dk: #111111;
    --cb: #161616;
    --st: #272727;
    --mi: #555;
    --as: #888;
    --st2: #303030;
    --lt: #CACAC8;
    --wh: #F4F4F2;
    --fm: 'JetBrains Mono', monospace;
    --fd: 'Barlow Condensed', sans-serif;
    --fb: 'Barlow', sans-serif;
    --ex: cubic-bezier(0.16, 1, 0.3, 1);
  }

  body { background: var(--bk); color: var(--wh); cursor: none; }
  #cur, #ring { position: fixed; pointer-events: none; z-index: 20000; border-radius: 50%; transform: translate(-50%, -50%); transition: transform 0.3s var(--ex), opacity 0.3s; }
  #cur { width: 6px; height: 6px; background: var(--r); }
  #ring { width: 34px; height: 34px; border: 1px solid rgba(255,255,255,0.2); }
  @media (pointer: coarse) { #cur, #ring { display: none; } body { cursor: auto; } }

  /* ── PAGE HEADER ── */
  .page-header {
    position: relative;
    margin-top: 68px !important;
    display: flex;
    align-items: center;
    padding: 4rem;
    min-height: 420px;
    overflow: hidden;
    background-size: cover;
    background-position: center;
    background-image: 
      linear-gradient(to right, rgba(10,10,10,.98) 0%, rgba(10,10,10,.7) 50%, rgba(10,10,10,.3) 100%),
      linear-gradient(to top, rgba(10,10,10,.95) 0%, transparent 60%),
      url('../../../assets/img/hero/reparacion-materiales.jpg');
  }
  .ph-inner { position: relative; z-index: 2; width: 100%; max-width: 1400px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; gap: 2rem; }
  .ph-count { text-align: right; border-left: 1px solid var(--st); padding-left: 2rem; }
  .ph-count b { display: block; font-size: 2.2rem; color: var(--wh); margin-bottom: 0.3rem; font-family: var(--fd); font-weight: 800; }
  
  @media (max-width: 900px) {
    .page-header { 
      margin-top: 66px !important; 
      min-height: 65vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      padding: 1.5rem !important;
      background-image: 
        linear-gradient(to right, rgba(10,10,10,.98) 0%, rgba(10,10,10,.8) 30%, rgba(10,10,10,.5) 60%, rgba(10,10,10,.2) 100%),
        linear-gradient(to top, rgba(10,10,10,.95) 0%, transparent 60%),
        url('../../../assets/img/hero/reparacion-materiales-mobile.jpg') !important;
    }
    .ph-inner { flex-direction: column; align-items: flex-start; gap: 1rem; width: 100%; height: 100%; justify-content: center; }
    .ph-title { font-size: 3.8rem !important; line-height: 0.95; }
    .ph-count { position: absolute; bottom: 1.5rem; left: 1.5rem; right: 1.5rem; text-align: left !important; border-left: none !important; border-top: 1px solid var(--st); padding-top: 1.2rem; margin-top: 0; width: auto; }
    .ph-count b { display: inline; font-size: 1.4rem; }
  }

  /* ── FILTER BAR ── */
  .filter-bar { position: sticky; top: 68px; z-index: 100; display: flex; align-items: center; justify-content: flex-start; gap: 1rem; padding: 1.25rem 4rem; background: rgba(10,10,10,0.95); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border-bottom: 1px solid var(--st); }
  .filter-label { font-family: var(--fm); font-size: 0.6rem; color: var(--mi); text-transform: uppercase; letter-spacing: 0.16em; flex-shrink: 0; }
  .filter-pills { display: flex; gap: 0.5rem; flex-wrap: wrap; flex: 1; }
  .pill { padding: 0.35rem 0.9rem; background: transparent; border: 1px solid var(--st2); color: var(--as); font-family: var(--fd); font-weight: 600; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.12em; cursor: pointer; transition: all .2s var(--ex); white-space: nowrap; }
  .pill:hover { color: var(--wh); border-color: var(--mi); }
  .pill.active { background: var(--r); border-color: var(--r); color: #fff; }
  
  .filter-right { display: flex; align-items: center; gap: 0.75rem; margin-left: auto; }
  .sort-select { background: var(--cb); border: 1px solid var(--st2); color: var(--as); font-family: var(--fm); font-size: 0.62rem; padding: 0.35rem 0.8rem; text-transform: uppercase; letter-spacing: 0.1em; cursor: pointer; outline: none; transition: border-color .2s, color .2s; }
  .sort-select:hover { border-color: var(--mi); color: var(--wh); }
  
  @media (max-width: 900px) {
    .filter-bar { top: 66px; padding: 0.8rem 1.5rem !important; gap: 0.6rem !important; flex-direction: row !important; align-items: center !important; }
    .filter-label { display: none !important; }
    .filter-right { flex: 1; display: flex !important; margin: 0 !important; }
    .custom-select-wrap { flex: 1; position: relative; }
    .custom-select-trigger { width: 100%; background: transparent; border: 1px solid var(--st); color: var(--as); padding: 0 0.8rem; font-family: var(--fm); font-size: 0.58rem; text-transform: uppercase; text-align: left; height: 38px; display: flex; align-items: center; position: relative; overflow: hidden; white-space: nowrap; }
    .custom-select-trigger::after { content: ''; position: absolute; right: 0.6rem; top: 50%; transform: translateY(-50%); border-left: 3px solid transparent; border-right: 3px solid transparent; border-top: 4px solid var(--r); transition: transform .3s; }
    .custom-select-wrap.open .custom-select-trigger::after { transform: translateY(-50%) rotate(180deg); }
    .custom-select-options { position: absolute; top: calc(100% + 5px); left: 0; right: 0; background: var(--dk); border: 1px solid var(--st); z-index: 1000; display: none; flex-direction: column; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    .custom-select-wrap.open .custom-select-options { display: flex; }
    .custom-option { padding: 0.8rem 1rem; font-family: var(--fm); font-size: 0.62rem; text-transform: uppercase; color: var(--as); border-bottom: 1px solid rgba(255,255,255,0.05); }
    .custom-option.selected { background: var(--cb); color: var(--wh); }
  }

  /* ── PRODUCTS SECTION ── */
  .products-section { padding: 1rem 0 6rem; background: var(--bk); width: 100%; }
  .prod-count-bar { padding: 0 4rem 0 !important; margin-bottom: 0.5rem !important; display: flex; align-items: center; }
  .prod-count-tx { font-family: var(--fm); font-size: 0.65rem; color: var(--mi); text-transform: uppercase; letter-spacing: 0.1em; }
  .prod-count-tx b { color: var(--wh); font-weight: 600; margin: 0 0.3rem; }
  
  @media (max-width: 900px) {
    .products-section { padding-top: 0.8rem; }
    .prod-count-bar { padding: 0 !important; justify-content: flex-start !important; }
    .prod-count-tx { text-align: left !important; width: 100%; }
  }

  .grid-wrap { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5px; background: var(--st); }
  @media (max-width: 1200px) { .grid-wrap { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 900px) { .grid-wrap { grid-template-columns: 1fr !important; gap: 1px; } }

  /* ── PRODUCT CARD ── */
  .pcard { background: var(--dk); display: flex; flex-direction: column; position: relative; overflow: hidden; transition: background .4s var(--ex); cursor: pointer; }
  .pcard:hover { background: var(--cb); }
  .pcard-img-wrap { position: relative; aspect-ratio: 1/1; background: var(--bk); padding: 2rem; display: flex; align-items: center; justify-content: center; overflow: hidden; }
  .pcard-img { max-width: 90%; max-height: 90%; object-fit: contain; transition: transform .8s var(--ex); z-index: 2; }
  .pcard:hover .pcard-img { transform: scale(1.08) translateY(-5px); }
  .pcard-img-ov { position: absolute; inset: 0; background: radial-gradient(circle at center, rgba(193, 18, 31, 0.05) 0%, transparent 70%); opacity: 0; transition: opacity 0.6s var(--ex); z-index: 1; }
  .pcard:hover .pcard-img-ov { opacity: 1; }
  .pcard-badge { position: absolute; top: 1.5rem; left: 1.5rem; z-index: 3; font-family: var(--fm); font-size: .6rem; text-transform: uppercase; color: var(--r); background: rgba(10,10,10,.6); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); padding: .4rem .8rem; border: 1px solid rgba(193,18,31,.3); letter-spacing: 0.15em; }
  .pcard-sku { position: absolute; bottom: 1rem; right: 1.5rem; z-index: 3; font-family: var(--fm); font-size: .65rem; color: var(--mi); opacity: 0.5; text-transform: uppercase; }
  
  .pcard-body { padding: 2rem; flex: 1; display: flex; flex-direction: column; border-top: 1px solid var(--st); }
  .pcard-cat { font-family: var(--fm); font-size: .6rem; color: var(--r); text-transform: uppercase; margin-bottom: .6rem; letter-spacing: 0.15em; }
  .pcard-name { font-family: var(--fd); font-weight: 800; font-size: 1.5rem; color: var(--wh); text-transform: uppercase; line-height: 1.1; margin-bottom: .8rem; }
  .pcard-desc { font-size: .88rem; color: var(--as); line-height: 1.6; margin-bottom: 2rem; display: -webkit-box; -webkit-line-clamp: 2; line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; text-align: left; }
  
  .pcard-features { display: flex; flex-direction: column; border: 1px solid var(--st); margin-bottom: 1.5rem; }
  .pcard-feat { display: flex; justify-content: space-between; align-items: center; padding: .7rem 1rem; border-bottom: 1px solid var(--st); transition: background .2s; }
  .pcard-feat:last-child { border-bottom: none; }
  .pcard-feat:hover { background: rgba(255,255,255,0.03); }
  .pcard-feat-label { font-family: var(--fm); font-size: .58rem; color: var(--mi); text-transform: uppercase; letter-spacing: 0.05em; }
  .pcard-feat-val { font-family: var(--fd); font-weight: 600; font-size: .9rem; color: var(--lt); }
  
  .pcard-actions { margin-top: auto; display: flex; gap: 1px; background: var(--st); border: 1px solid var(--st); }
  .btn-ver, .btn-ft { flex: 1; height: 50px; display: flex; align-items: center; justify-content: center; gap: 0.6rem; font-family: var(--fd); font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.15em; transition: all 0.3s var(--ex); cursor: pointer; border: none; text-decoration: none; }
  .btn-ver { background: var(--r); color: #fff; }
  .btn-ver:hover { background: var(--rh); gap: 0.8rem; }
  .btn-ft { background: var(--dk); color: var(--as); }
  .btn-ft:hover { background: var(--cb); color: var(--wh); }

  /* ── MODAL ── */
  .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); z-index: 10000; display: flex; align-items: flex-start; justify-content: center; padding: 2rem; opacity: 0; visibility: hidden; transition: all .5s var(--ex); overflow-y: auto; }
  .modal-bg.open { opacity: 1; visibility: visible; }
  .modal { background: var(--dk); border: 1px solid var(--st); width: 100%; max-width: 860px; position: relative; transform: translateY(50px); transition: transform .6s var(--ex); margin: auto; }
  .modal-bg.open .modal { transform: translateY(0); }
  .modal-close { position: absolute; top: 1.5rem; right: 1.5rem; width: 40px; height: 40px; background: rgba(255,255,255,0.05); border: 1px solid var(--st); color: var(--wh); display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 10; }
  .modal-close:hover { background: var(--r); }
  .modal-grid { display: grid; grid-template-columns: 1fr 1fr; }
  .modal-img { width: 100%; aspect-ratio: 1/1; object-fit: contain; background: var(--cb); padding: 2rem; }
  .modal-body { padding: 3rem; display: flex; flex-direction: column; justify-content: center; }
  .modal-cat { font-family: var(--fm); font-size: .65rem; color: var(--r); text-transform: uppercase; margin-bottom: .5rem; }
  .modal-name { font-family: var(--fd); font-weight: 900; font-size: 2rem; color: var(--wh); text-transform: uppercase; margin-bottom: 1.2rem; line-height: 1.1; overflow-wrap: break-word; }
  .modal-desc { font-size: .9rem; color: var(--lt); line-height: 1.6; margin-bottom: 2rem; overflow-wrap: break-word; }
  .modal-feats-title { font-family: var(--fm); font-size: .55rem; color: var(--mi); text-transform: uppercase; margin-bottom: 1rem; border-bottom: 1px solid var(--st); padding-bottom: .5rem; }
  .modal-actions { display: flex; gap: 1rem; margin-top: 2rem; }

  @media (max-width: 900px) {
    .modal-grid { grid-template-columns: 1fr; }
    .modal-body { padding: 1.5rem; }
    .modal { margin-top: 2rem; width: 100%; }
    .modal-bg { padding: 1rem; }
    .modal-name { font-size: 1.6rem; }
    .modal-actions { margin-top: 1rem; }
  }

  /* ── ANIMATIONS ── */
  .reveal { opacity: 0; transform: translateY(20px); transition: all .7s var(--ex); }
  .reveal.in { opacity: 1; transform: none; }
</style>
</head>
<body>
<div id="cur"></div>
<div id="ring"></div>
<div id="nav-placeholder"></div>

<!-- ══ PAGE HEADER ══ -->
<div class="page-header">
  <div class="ph-inner">
    <div>
      <div class="ph-eyebrow">
        <span class="ph-eyebrow-line"></span>
        <span class="ph-eyebrow-tx">Materiales · Pulido</span>
      </div>
      <h1 class="ph-title">Mortero<br>cementicio</h1>
      <p class="ph-desc">Mortero cementicio para la reparación superficial y bacheo en pisos antes del proceso de pulido.</p>
    </div>
    <div class="ph-count">
      <b id="total-count">0</b>
      productos disponibles
    </div>

</div>

<!-- ══ FILTER BAR ══ -->
<div class="filter-bar">
  <span class="filter-label">Filtrar:</span>
  <div class="filter-pills hide-mobile">
    <button class="pill active" data-filter="all">Todos</button>
    <button class="pill" data-filter="grouting">Grouting</button>
    <button class="pill" data-filter="mortero-cementicio">Mortero</button>
  </div>

  <div class="custom-select-wrap hide-desktop" id="customFilter">
    <button class="custom-select-trigger" id="customFilterTrigger">Mortero</button>
    <div class="custom-select-options">
      <div class="custom-option selected" data-value="all">Todos</div>
      <div class="custom-option" data-value="grouting">Grouting</div>
      <div class="custom-option" data-value="mortero-cementicio">Mortero</div>
    </div>
  </div>

  <div class="filter-right">
    <span class="filter-label hide-mobile" style="margin-right: -0.5rem;">Ordenar:</span>
    <select class="sort-select" id="sortSelect">
      <option value="default">Destacados</option>
      <option value="az">A–Z</option>
      <option value="za">Z–A</option>
    </select>
  </div>
</div>

<!-- ══ PRODUCTS ══ -->
<section class="products-section">
  <div class="prod-count-bar">
    <span class="prod-count-tx">Mostrando <b id="showing-count">0</b> productos</span>
  </div>
  <div class="grid-wrap" id="productGrid">
    <!-- Cards rendered by JS -->
  </div>
</section>

<!-- ══ MODAL ══ -->
<div class="modal-bg" id="modalBg">
  <div class="modal" id="modal">
    <button class="modal-close" id="modalClose">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M1 1l12 12M13 1L1 13" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
    </button>
    <div class="modal-grid">
      <img id="modalImg" src="" alt="" class="modal-img">
      <div class="modal-body">
        <div class="modal-cat" id="modalCat"></div>
        <div class="modal-name" id="modalName"></div>
        <div class="modal-desc" id="modalDesc"></div>
        <div class="modal-feats-title">Características técnicas</div>
        <div class="pcard-features" id="modalFeats"></div>
        <div class="modal-actions">
          <a href="#" class="btn-ver" style="flex:1;" id="modalConsultar">
            Consultar disponibilidad
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 7h10M7 3l4 4-4 4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
          </a>
          <a href="#" class="btn-ft" id="modalFicha" download>
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1v8M4 6l3 3 3-3M2 11h10" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
            Ficha técnica
          </a>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="footer-placeholder"></div>

<script src="../../../assets/js/layout.js"></script>
<script src="../../../assets/js/main.js"></script>
<script src="../../../assets/js/nav.js"></script>
<script src="../../../assets/data/productos.js"></script>

<script>
const PAGE_SECCION      = 'pulido';
const PAGE_CATEGORIA    = 'materiales';
const PAGE_SUBCATEGORIA = 'mortero-cementicio';
const ROOT              = '../../../';

const ALL_PRODUCTS = typeof productos !== 'undefined' ? productos : [];
let activeFilter = 'all';
let activeSort   = 'default';

function iconSVG(type) {
  const icons = {
    down: `<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1v8M4 6l3 3 3-3M2 11h10" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>`,
    arrow: `<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 7h10M7 3l4 4-4 4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>`
  };
  return icons[type] || '';
}

function renderCard(p, delay) {
  const badge = p.badge ? `<div class="pcard-badge-new">${p.badge}</div>` : '';
  
  let rawCat = p.cat_label;
  if (!rawCat && p.rutas) {
      const route = p.rutas.find(r => 
        (r.sección === PAGE_SECCION) && 
        (r.categoría === PAGE_CATEGORIA)
      );
      if (route) {
          rawCat = route.subcategoría || route.subcategoria || route.categoría || route.categoria;
      }
  }
  let catLabel = rawCat || 'Material';
  catLabel = catLabel.charAt(0).toUpperCase() + catLabel.slice(1).replace(/-/g, ' ');

  const feats = (p.specs || []).slice(0, 3).map(f => `
    <div class="pcard-feat">
      <span class="pcard-feat-label">${f.clave}</span>
      <span class="pcard-feat-val">${f.valor}</span>
    </div>`).join('');

  const imgSrc = p.imagen.startsWith('http') ? p.imagen : ROOT + p.imagen.replace(/^\//, '');
  const shop = p.tiendaUrl;
  const pdf  = p.pdfUrl;

  return `
  <div class="pcard reveal in d${delay}" data-id="${p.id}" onclick="openModal('${p.id}')">
    <div class="pcard-img-wrap">
      <img class="pcard-img" src="${imgSrc}" alt="${p.nombre}" loading="lazy">
      <div class="pcard-img-ov"></div>
      <div class="pcard-badge">${catLabel}</div>
      ${badge}
      <div class="pcard-sku">${p.sku}</div>
    </div>
    <div class="pcard-body">
      <div class="pcard-cat">${catLabel}</div>
      <div class="pcard-name">${p.nombre}</div>
      <div class="pcard-desc">${p.descripcion}</div>
      <div class="pcard-features">${feats}</div>
      <div class="pcard-actions">
        <button class="btn-ver">
          Ver detalles ${iconSVG('arrow')}
        </button>
        ${shop 
          ? `<a href="${shop}" target="_blank" rel="noopener" class="btn-ft" onclick="event.stopPropagation()">Tienda</a>`
          : (pdf 
              ? `<a href="${pdf}" target="_blank" rel="noopener" class="btn-ft" onclick="event.stopPropagation()">${iconSVG('down')} Ficha técnica</a>`
              : `<a href="https://wa.me/5492342464082" target="_blank" rel="noopener" class="btn-ft" onclick="event.stopPropagation()">Consultar</a>`
            )
        }
      </div>
    </div>
  </div>`;
}

function matchProduct(p, seccion, categoria, subcategoria) {
  if (p.rutas && p.rutas.length > 0) {
    return p.rutas.some(function(r) {
      var s  = r['sección']     || r['seccion']     || '';
      var c  = r['categoría']   || r['categoria']   || '';
      var sc = r['subcategoría']|| r['subcategoria']|| '';
      if (s !== seccion) return false;
      if (categoria   && c  !== categoria)   return false;
      if (subcategoria && subcategoria !== 'all' && sc !== subcategoria) return false;
      return true;
    });
  }
  return false;
}

function getFiltered() {
  return ALL_PRODUCTS.filter(function(p) {
    return matchProduct(p, PAGE_SECCION, PAGE_CATEGORIA, activeFilter === 'all' ? PAGE_SUBCATEGORIA : activeFilter);
  }).sort(function(a, b) {
    if (activeSort === 'az') return a.nombre.localeCompare(b.nombre);
    if (activeSort === 'za') return b.nombre.localeCompare(a.nombre);
    return 0;
  });
}

function render() {
  const grid   = document.getElementById('productGrid');
  const list   = getFiltered();
  const delays = [1,2,3,1,2,3,1,2,3,1,2];
  document.getElementById('showing-count').textContent = list.length;
  document.getElementById('total-count').textContent   = list.length;
  if (list.length === 0) {
    grid.innerHTML = `<div class="empty-state"><h3>Sin resultados</h3><p>No hay productos en esta categoría.</p></div>`;
    return;
  }
  grid.innerHTML = list.map((p,i) => renderCard(p, delays[i % delays.length])).join('');
  requestAnimationFrame(() => {
    document.querySelectorAll('.reveal').forEach(el => obsReveal.observe(el));
  });
}

// Filter Pills
document.querySelectorAll('.pill').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.pill').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    
    // Sync mobile select
    const trigger = document.getElementById('customFilterTrigger');
    const opt = document.querySelector(`.custom-option[data-value="${activeFilter}"]`);
    if(trigger && opt) trigger.textContent = opt.textContent;
    
    render();
  });
});

// Mobile Select
const customFilter = document.getElementById('customFilter');
const customFilterTrigger = document.getElementById('customFilterTrigger');
if (customFilterTrigger) {
  customFilterTrigger.addEventListener('click', () => customFilter.classList.toggle('open'));
}
document.querySelectorAll('.custom-option').forEach(opt => {
  opt.addEventListener('click', () => {
    document.querySelectorAll('.custom-option').forEach(o => o.classList.remove('selected'));
    opt.classList.add('selected');
    activeFilter = opt.dataset.value;
    customFilterTrigger.textContent = opt.textContent;
    customFilter.classList.remove('open');
    
    // Sync pills
    document.querySelectorAll('.pill').forEach(p => p.classList.toggle('active', p.dataset.filter === activeFilter));
    
    render();
  });
});

document.getElementById('sortSelect').addEventListener('change', e => {
  activeSort = e.target.value;
  render();
});

const modalBg = document.getElementById('modalBg');
function openModal(id) {
  const p = ALL_PRODUCTS.find(x => x.id === id);
  if (!p) return;
  const imgSrc = p.imagen.startsWith('http') ? p.imagen : ROOT + p.imagen.replace(/^\//, '');
  document.getElementById('modalImg').src    = imgSrc;
  document.getElementById('modalImg').alt    = p.nombre;
  document.getElementById('modalCat').textContent  = (p.cat_label || 'Categoría') + ' · ' + p.sku;
  document.getElementById('modalName').textContent = p.nombre;
  document.getElementById('modalDesc').textContent = p.descripcion;
  const wp = `https://wa.me/5492342464082?text=Hola,%20me%20interesa%20el%20producto:%20${encodeURIComponent(p.nombre)}%20(SKU:%20${p.sku})`;
  document.getElementById('modalConsultar').href = wp;
  const modalFicha = document.getElementById('modalFicha');
  if (p.pdfUrl) {
    modalFicha.href = p.pdfUrl;
    modalFicha.style.display = 'inline-flex';
  } else {
    modalFicha.style.display = 'none';
  }
  const featsHTML = (p.specs || []).map(f => `
    <div class="pcard-feat">
      <span class="pcard-feat-label">${f.clave}</span>
      <span class="pcard-feat-val">${f.valor}</span>
    </div>`).join('');
  document.getElementById('modalFeats').innerHTML = featsHTML;
  modalBg.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() { modalBg.classList.remove('open'); document.body.style.overflow = ''; }
document.getElementById('modalClose').addEventListener('click', closeModal);
modalBg.addEventListener('click', e => { if(e.target === modalBg) closeModal(); });

const cur = document.getElementById('cur'), ring = document.getElementById('ring');
document.addEventListener('mousemove', e => {
  cur.style.left = e.clientX + 'px'; cur.style.top = e.clientY + 'px'; ring.style.left = e.clientX + 'px'; ring.style.top = e.clientY + 'px';
});

const obsReveal = new IntersectionObserver(entries => {
  entries.forEach(en => { if(en.isIntersecting) en.target.classList.add('in'); });
}, { threshold: 0.1 });

render();
</script>
